<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Управление установкой</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1e24;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            background: #0f1217;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
            overflow: hidden;
            padding: 20px 16px 30px;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn-change-id {
            background: #2c313a;
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-change-id:active {
            background: #3e4550;
            transform: scale(0.96);
        }

        .info-panel {
            background: #1e242c;
            border-radius: 10px;
            padding: 16px 20px 20px;
            margin-bottom: 24px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .address-line {
            font-size: 16px;
            font-weight: 600;
            color: #8ab4f8;
            border-bottom: 1px solid #2f3a46;
            padding-bottom: 8px;
            margin-bottom: 12px;
            text-align: center;
            word-break: break-word;
        }

        .message-area {
            flex: 1;
            min-height: 90px;
            font-size: 18px;
            line-height: 1.4;
            color: #eef2ff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            word-break: break-word;
        }

        .temp-area {
            border-top: 1px solid #2f3a46;
            padding-top: 12px;
            margin-top: 8px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            color: #ffb86c;
        }

        .temp-label {
            font-size: 14px;
            font-weight: normal;
            color: #9aa9b9;
            margin-right: 6px;
        }

        .temp-value {
            font-family: monospace;
            font-size: 26px;
            font-weight: 700;
        }

        .temp-negative {
            color: #6c8ebf;
        }

        .temp-positive {
            color: #ffb86c;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .ctrl-btn {
            background: #2c313a;
            border: none;
            color: white;
            font-size: 13px;
            font-weight: 500;
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .ctrl-btn:active {
            background: #3e4550;
            transform: scale(0.97);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e242c;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            padding: 24px 20px;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: white;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #0f1217;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content button {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .status-badge {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            color: #7e8c9e;
        }

        .footer-note {
            font-size: 10px;
            text-align: center;
            margin-top: 20px;
            color: #4a5562;
        }

        @media (max-width: 480px) {
            .buttons-grid {
                gap: 6px;
            }
            .ctrl-btn {
                font-size: 11px;
                padding: 10px 0;
            }
            .temp-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="btn-change-id" id="changeIdBtn">Сменить ID</button>
    </div>

    <div class="info-panel">
        <div class="address-line" id="addressDisplay">— Адрес не задан —</div>
        <div class="message-area" id="messageDisplay">Ожидание сообщений...</div>
        <div class="temp-area">
            <span class="temp-label">🌡️ Температура</span>
            <span class="temp-value" id="tempValue">--.-</span>
            <span>°C</span>
        </div>
    </div>

    <div class="buttons-grid">
        <button class="ctrl-btn" data-cmd="status">Статус</button>
        <button class="ctrl-btn" data-cmd="on">Включить</button>
        <button class="ctrl-btn" data-cmd="off">Выключить</button>
        <button class="ctrl-btn" data-cmd="dry_start">Начать сушку</button>
        <button class="ctrl-btn" data-cmd="dry_stop">Завершить сушку</button>
    </div>
    <div class="status-badge" id="mqttStatus">🔌 Подключение...</div>
    <div class="footer-note">MQTT: защищённое подключение (WSS)</div>
</div>

<div id="idModal" class="modal">
    <div class="modal-content">
        <h3>Введите ваш ID</h3>
        <input type="text" id="clientIdInput" placeholder="Например: Svenlana_N" autocomplete="off">
        <button id="saveIdBtn">Сохранить</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    //  БАЗА ДАННЫХ ID -> АДРЕС
    // --------------------------------------------------------------
    const clientDatabase = {
        "Svenlana_N": "пр. Мира 48",
        "Kseniya_N": "пр. Мира 48",
        "Svenlana_L": "ул. Лермонтова 15",
        "Oksana_L": "ул. Лермонтова 15"
    };

    const DEFAULT_ADDRESS = "Адрес не указан в базе";

    // --------------------------------------------------------------
    //  MQTT НАСТРОЙКИ (WebSocket TLS)
    // --------------------------------------------------------------
    const broker = {
        host: "m4.wqtt.ru",
        port: 15415,
        path: "/mqtt",
        username: "u_raTefa",
        password: "0B2Gp4iF"
    };

    const TOPIC_READ = "Read";
    const TOPIC_POST = "Post";
    const TOPIC_TEMP = "Temp";

    let mqttClient = null;
    let currentClientId = null;
    let currentAddress = "";

    const addressDisplay = document.getElementById("addressDisplay");
    const messageDisplay = document.getElementById("messageDisplay");
    const tempValueSpan = document.getElementById("tempValue");
    const mqttStatusSpan = document.getElementById("mqttStatus");
    const modal = document.getElementById("idModal");
    const clientIdInput = document.getElementById("clientIdInput");
    const saveIdBtn = document.getElementById("saveIdBtn");
    const changeIdBtn = document.getElementById("changeIdBtn");

    // --------------------------------------------------------------
    //  Функция форматирования температуры со знаком
    // --------------------------------------------------------------
    function formatTemperature(value) {
        // Если значение не число или пустое
        if (value === null || value === undefined || value === "") {
            return "--.-";
        }
        
        // Пытаемся извлечь число из строки (поддерживает отрицательные)
        const match = String(value).match(/(-?\d+(?:\.\d+)?)/);
        if (!match) {
            return String(value);
        }
        
        let num = parseFloat(match[1]);
        if (isNaN(num)) {
            return String(value);
        }
        
        // Форматируем с одним знаком после запятой
        const formatted = num.toFixed(1);
        
        // Добавляем знак + для положительных чисел
        if (num > 0) {
            return `+${formatted}`;
        } else if (num < 0) {
            return `${formatted}`; // минус уже есть в formatted
        } else {
            return `+0.0`; // ноль показываем с плюсом
        }
    }

    // --------------------------------------------------------------
    //  Функции работы с ID и адресом
    // --------------------------------------------------------------
    function getAddressById(id) {
        if (!id) return DEFAULT_ADDRESS;
        return clientDatabase[id] || DEFAULT_ADDRESS;
    }

    function updateAddressDisplay() {
        if (currentClientId) {
            currentAddress = getAddressById(currentClientId);
            addressDisplay.innerText = currentAddress;
        } else {
            addressDisplay.innerText = "— Адрес не задан —";
        }
    }

    function setClientId(id) {
        if (!id || id.trim() === "") return false;
        const trimmedId = id.trim();
        currentClientId = trimmedId;
        localStorage.setItem("app_client_id", trimmedId);
        updateAddressDisplay();
        messageDisplay.innerText = "ID изменен. Ожидание данных...";
        tempValueSpan.innerText = "--.-";
        tempValueSpan.className = "temp-value";
        return true;
    }

    function loadStoredId() {
        const stored = localStorage.getItem("app_client_id");
        if (stored && stored !== "") {
            setClientId(stored);
            return true;
        }
        return false;
    }

    function showIdModal() {
        if (currentClientId) {
            clientIdInput.value = currentClientId;
        } else {
            clientIdInput.value = "";
        }
        modal.style.display = "flex";
    }

    function hideModal() {
        modal.style.display = "none";
    }

    // --------------------------------------------------------------
    //  MQTT ЛОГИКА (WSS - WebSocket Secure)
    // --------------------------------------------------------------
    function publishCommand(payload) {
        if (!mqttClient || !mqttClient.isConnected()) {
            console.warn("MQTT не подключен");
            mqttStatusSpan.innerText = "⚠️ Нет соединения";
            return false;
        }
        const message = new Paho.MQTT.Message(payload);
        message.destinationName = TOPIC_READ;
        mqttClient.send(message);
        console.log(`[MQTT] Отправлено: ${payload}`);
        return true;
    }

    function onMessageArrived(message) {
        const topic = message.destinationName;
        const payload = message.payloadString;
        console.log(`[MQTT] Получено: ${topic} -> ${payload}`);

        if (topic === TOPIC_POST) {
            messageDisplay.innerText = payload || "(пустое сообщение)";
        } 
        else if (topic === TOPIC_TEMP) {
            // Форматируем температуру со знаком
            const formattedTemp = formatTemperature(payload);
            tempValueSpan.innerText = formattedTemp;
            
            // Меняем цвет в зависимости от знака
            if (formattedTemp.startsWith("-")) {
                tempValueSpan.className = "temp-value temp-negative";
            } else {
                tempValueSpan.className = "temp-value temp-positive";
            }
        }
    }

    function onConnect() {
        console.log("MQTT подключен (WSS)");
        mqttStatusSpan.innerText = "✅ MQTT онлайн";
        if (mqttClient && mqttClient.isConnected()) {
            mqttClient.subscribe(TOPIC_POST);
            mqttClient.subscribe(TOPIC_TEMP);
            console.log(`Подписка на ${TOPIC_POST} и ${TOPIC_TEMP}`);
            publishCommand("$3#");
        }
    }

    function onConnectionLost(response) {
        console.error("Потеря соединения", response);
        mqttStatusSpan.innerText = "❌ Соединение потеряно";
        setTimeout(() => {
            if (mqttClient) {
                initMqtt();
            }
        }, 5000);
    }

    function initMqtt() {
        const clientId = "web_" + Math.random().toString(36).substr(2, 8) + "_" + Date.now();
        
        mqttClient = new Paho.MQTT.Client(
            broker.host,
            Number(broker.port),
            broker.path,
            clientId
        );
        
        mqttClient.onConnectionLost = onConnectionLost;
        mqttClient.onMessageArrived = onMessageArrived;

        const connectOptions = {
            onSuccess: onConnect,
            onFailure: (err) => {
                console.error("Ошибка подключения к MQTT", err);
                mqttStatusSpan.innerText = "🔴 Ошибка подключения";
            },
            userName: broker.username,
            password: broker.password,
            useSSL: true,
            keepAliveInterval: 60,
            mqttVersion: 4
        };
        
        mqttClient.connect(connectOptions);
    }

    // --------------------------------------------------------------
    //  Обработка команд кнопок
    // --------------------------------------------------------------
    function handleCommand(cmdType) {
        let payload = "";
        switch (cmdType) {
            case "status": payload = "$3#"; break;
            case "on": payload = "$1#"; break;
            case "off": payload = "$11#"; break;
            case "dry_start": payload = "$2#"; break;
            case "dry_stop": payload = "$22#"; break;
            default: return;
        }
        publishCommand(payload);
    }

    function bindButtons() {
        const buttons = document.querySelectorAll(".ctrl-btn");
        buttons.forEach(btn => {
            btn.removeEventListener("click", btn._handler);
            const cmd = btn.getAttribute("data-cmd");
            const handler = () => handleCommand(cmd);
            btn._handler = handler;
            btn.addEventListener("click", handler);
        });
    }

    function setupEventListeners() {
        changeIdBtn.addEventListener("click", showIdModal);
        saveIdBtn.addEventListener("click", () => {
            const newId = clientIdInput.value.trim();
            if (newId === "") {
                alert("ID не может быть пустым");
                return;
            }
            setClientId(newId);
            hideModal();
            messageDisplay.innerText = `ID: ${newId}. Ожидание данных...`;
        });
        modal.addEventListener("click", (e) => {
            if (e.target === modal) hideModal();
        });
    }

    function startApp() {
        bindButtons();
        setupEventListeners();
        const hasId = loadStoredId();
        if (!hasId) {
            showIdModal();
        } else {
            updateAddressDisplay();
            messageDisplay.innerText = "Подключение к MQTT...";
        }
        initMqtt();
    }

    startApp();
</script>
</body>
</html>
